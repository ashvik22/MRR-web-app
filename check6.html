<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fit Image to Handphone Screen</title>
  <style>
    /* Reset and base */
    *, *::before, *::after {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background-color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
      font-family: Georgia, serif;
    }

    img {
      max-width: 100vw;
      max-height: 100vh;
      object-fit: contain;
      display: block;
    }

    .btn-start {
      position: absolute;
      bottom: 15%; /* Changed from 8% */
      left: 50%;
      transform: translateX(-50%);
      background-color: darkgreen;
      color: white;
      font-family: Georgia, serif;
      font-weight: 700;
      font-size: 1em;
      padding: 1.4% 6.4%;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s ease;
      user-select: none;
      text-align: center;
      text-decoration: none;
      z-index: 2;
    }

    .btn-start:hover,
    .btn-start:focus {
      background-color: #0A3915;
      outline: none;
    }
  </style>
</head>
<body>
  <img src="check pt 2_B.jpg" alt="Image fitting handphone screen" />
  <!-- Link changed to MAP.html -->
  <a href="MAP.html" class="btn-start" role="button" aria-label="Next Checkpoint Button">Back to Map</a>
  <script>
      localStorage.setItem('check3', "2");
  </script>
</body>
</html>
