<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fit Image to Handphone Screen</title>
  <style>
    /* Reset and base */
    *, *::before, *::after {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background-color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative; /* For button positioning */
    }

    img {
      max-width: 100vw;
      max-height: 100vh;
      object-fit: contain;
      display: block;
    }

    .btn-start {
      position: absolute; /* Position button absolutely */
      bottom: 100px; /* Shifted up more */
      left: 50%; /* Center horizontally */
      transform: translateX(-50%); /* Center the button */
      background-color: darkgreen;
      color: white;
      font-family: Georgia, serif;
      font-weight: 700;
      font-size: 1rem;
      padding: 14px 64px;
      border: none;
      border-radius: 5px; /* Changed from 5px */
      cursor: pointer;
      transition: background-color 0.3s ease;
      user-select: none;
      text-align: center;
      text-decoration: none;
      z-index: 2;
    }

    .btn-start:hover,
    .btn-start:focus {
      background-color: #0A3915;
      outline: none;
    }
  </style>
</head>
<body>
  <img src="instruction_v4.jpg" alt="Image fitting handphone screen" />
  <a href="MAP.html" class="btn-start" role="button" aria-label="Start Trail Button">Let's Walk!</a>
</body>
</html>
